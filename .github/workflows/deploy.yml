name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

env:
  NTFY_TOPIC: aurore-deploy-af55e122

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Notify deploy start
        run: |
          MSG=$(git log -1 --pretty=%s)
          curl -s -H "Title: 🏗️ 배포 시작" -H "Tags: construction" -H "Priority: low" -d "ore-no-dash 배포 시작! - ${MSG}" https://ntfy.sh/$NTFY_TOPIC || true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Collect deploy stats
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          TOTAL=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/ore-no-dash/deployments?per_page=1" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | jq -r '.result_info.total_count // 0')
          TOTAL=$((TOTAL + 1))
          echo "{\"total\":$TOTAL,\"lastDeployedAt\":\"$(date -u '+%Y-%m-%dT%H:%M:%SZ')\",\"lastStatus\":\"success\",\"project\":\"ore-no-dash\"}" > public/deploy-stats.json
          echo "DEPLOY_NUM=$TOTAL" >> $GITHUB_ENV

      - run: npm run build

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name ore-no-dash --commit-dirty=true --commit-message "Deploy from GitHub Actions"

      - name: Notify deploy success
        if: success()
        run: |
          MSG=$(git log -1 --pretty=%s)
          curl -s \
            -H "Title: ✅ 배포 완료 #$DEPLOY_NUM" \
            -H "Tags: white_check_mark,rocket" \
            -H "Priority: default" \
            -H "Click: https://home.aurore.work" \
            -H "Actions: view, Open Site, https://home.aurore.work" \
            -d "배포 성공! ${MSG} - https://home.aurore.work" \
            https://ntfy.sh/$NTFY_TOPIC || true

      - name: Notify deploy failure
        if: failure()
        run: |
          MSG=$(git log -1 --pretty=%s)
          curl -s \
            -H "Title: ❌ 배포 실패!" \
            -H "Tags: x,warning" \
            -H "Priority: high" \
            -H "Click: https://github.com/aurore81/ore-no-dash/actions/runs/${{ github.run_id }}" \
            -H "Actions: view, View Log, https://github.com/aurore81/ore-no-dash/actions/runs/${{ github.run_id }}" \
            -d "배포 실패! ${MSG}" \
            https://ntfy.sh/$NTFY_TOPIC || true
