name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

env:
  NTFY_TOPIC: aurore-deploy-af55e122
  API_URL: https://api.aurore.work
  API_KEY: ore-no-write-8f3k2m9x

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Record deploy start time
        run: echo "DEPLOY_START=$(date +%s)" >> $GITHUB_ENV

      - name: Notify deploy start
        run: |
          MSG=$(git log -1 --pretty=%s)
          curl -s -H "Title: 🏗️ 배포 시작" -H "Tags: construction" -H "Priority: low" -d "ore-no-dash 배포 시작! - ${MSG}" https://ntfy.sh/$NTFY_TOPIC || true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name ore-no-dash --commit-dirty=true --commit-message "Deploy from GitHub Actions"

      - name: Purge Cloudflare cache
        if: success()
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_CACHE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"hosts":["home.aurore.work"]}' || true

      - name: Record deploy to DB + notify success
        if: success()
        run: |
          MSG=$(git log -1 --pretty=%s)
          HASH=$(git log -1 --pretty=%h)
          DURATION=$(( $(date +%s) - $DEPLOY_START ))
          curl -s -X POST "$API_URL/deploy-stats" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $API_KEY" \
            -d "{\"project\":\"ore-no-dash\",\"status\":\"success\",\"commit_hash\":\"$HASH\",\"commit_message\":\"$MSG\",\"branch\":\"main\",\"duration_s\":$DURATION}" || true
          TOTAL=$(curl -s "$API_URL/deploy-stats?project=ore-no-dash" | jq -r '.total // "?"')
          curl -s \
            -H "Title: ✅ 배포 완료 #$TOTAL" \
            -H "Tags: white_check_mark,rocket" \
            -H "Priority: default" \
            -H "Click: https://home.aurore.work" \
            -H "Actions: view, Open Site, https://home.aurore.work" \
            -d "배포 성공! ${MSG} - https://home.aurore.work" \
            https://ntfy.sh/$NTFY_TOPIC || true

      - name: Record failure to DB + notify
        if: failure()
        run: |
          MSG=$(git log -1 --pretty=%s)
          HASH=$(git log -1 --pretty=%h)
          DURATION=$(( $(date +%s) - $DEPLOY_START ))
          curl -s -X POST "$API_URL/deploy-stats" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $API_KEY" \
            -d "{\"project\":\"ore-no-dash\",\"status\":\"failure\",\"commit_hash\":\"$HASH\",\"commit_message\":\"$MSG\",\"branch\":\"main\",\"duration_s\":$DURATION}" || true
          curl -s \
            -H "Title: ❌ 배포 실패!" \
            -H "Tags: x,warning" \
            -H "Priority: high" \
            -H "Click: https://github.com/aurore81/ore-no-dash/actions/runs/${{ github.run_id }}" \
            -H "Actions: view, View Log, https://github.com/aurore81/ore-no-dash/actions/runs/${{ github.run_id }}" \
            -d "배포 실패! ${MSG}" \
            https://ntfy.sh/$NTFY_TOPIC || true
